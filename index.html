<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROBE Demo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f4f6f9;
            --white: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --radius: 8px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            line-height: 1.6;
        }

        /* ── 공통 ── */
        .hidden { display: none !important; }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .btn-primary { background: var(--primary); color: #fff; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-outline:hover { background: #ede9fe; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #dc2626; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--primary); }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .success-msg {
            color: #16a34a;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        /* ── 카드 ── */
        .card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            padding: 40px;
        }

        /* ── 인증 레이아웃 ── */
        #auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-box {
            width: 100%;
            max-width: 420px;
        }

        .auth-box h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .auth-box p.subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        .auth-switch a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* ── 대시보드 레이아웃 ── */
        #dashboard-container { display: none; min-height: 100vh; }

        /* 네비게이션 */
        #navbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #nav-username {
            font-size: 14px;
            color: var(--muted);
        }

        #btn-logout {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* 대시보드 본문 */
        .dashboard-body {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .dashboard-body h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        #welcome-message {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .stat-card .stat-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        /* 프로필 섹션 */
        #profile-section {
            background: var(--white);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        #profile-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .profile-row:last-child { border-bottom: none; }
        .profile-row span:first-child { color: var(--muted); }
        .profile-row span:last-child { font-weight: 500; }
    </style>
</head>
<body>

<!-- ── 인증 영역 ── -->
<div id="auth-container">

    <!-- 로그인 폼 -->
    <div class="auth-box card" id="login-box">
        <h1>로그인</h1>
        <p class="subtitle">이메일과 비밀번호를 입력해주세요.</p>

        <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <p class="error-msg" id="login-error">이메일 또는 비밀번호가 올바르지 않습니다.</p>

        <button class="btn btn-primary" id="btn-login">로그인</button>

        <p class="auth-switch">
            계정이 없으신가요?
            <a id="go-register">회원가입</a>
        </p>
    </div>

    <!-- 회원가입 폼 -->
    <div class="auth-box card hidden" id="register-box">
        <h1>회원가입</h1>
        <p class="subtitle">계정을 만들어 시작하세요.</p>

        <div class="form-group">
            <label for="register-name">이름</label>
            <input type="text" id="register-name" placeholder="홍길동">
        </div>
        <div class="form-group">
            <label for="register-email">이메일</label>
            <input type="email" id="register-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="register-password">비밀번호</label>
            <input type="password" id="register-password" placeholder="6자 이상 입력">
        </div>
        <div class="form-group">
            <label for="register-confirm">비밀번호 확인</label>
            <input type="password" id="register-confirm" placeholder="비밀번호 재입력">
        </div>

        <p class="error-msg" id="register-error"></p>
        <p class="success-msg" id="register-success">회원가입이 완료되었습니다. 로그인해주세요.</p>

        <button class="btn btn-primary" id="btn-register">회원가입</button>

        <p class="auth-switch">
            이미 계정이 있으신가요?
            <a id="go-login">로그인</a>
        </p>
    </div>

</div>

<!-- ── 대시보드 영역 ── -->
<div id="dashboard-container">

    <!-- 네비게이션 -->
    <nav id="navbar">
        <span class="nav-brand">PROBE Demo</span>
        <div class="nav-right">
            <span id="nav-username"></span>
            <button class="btn btn-danger" id="btn-logout">로그아웃</button>
        </div>
    </nav>

    <!-- 본문 -->
    <div class="dashboard-body">
        <h2 id="dashboard-title">Dashboard</h2>
        <p id="welcome-message"></p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Tests Run</div>
                <div class="stat-value" id="stat-tests">12</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Passed</div>
                <div class="stat-value" id="stat-passed">10</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Failed</div>
                <div class="stat-value" id="stat-failed">2</div>
            </div>
        </div>

        <div id="profile-section">
            <h3>My Profile</h3>
            <div class="profile-row">
                <span>Name</span>
                <span id="profile-name"></span>
            </div>
            <div class="profile-row">
                <span>Email</span>
                <span id="profile-email"></span>
            </div>
            <div class="profile-row">
                <span>Role</span>
                <span id="profile-role">Member</span>
            </div>
        </div>
    </div>

</div>

<script>
    // ── 상수 ──
    var STORAGE_KEY = 'probe_users';
    var SESSION_KEY = 'probe_session';

    // ── 유틸 ──
    function getUsers() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveUsers(users) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    function getSession() {
        return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
    }

    function setSession(user) {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
    }

    function clearSession() {
        sessionStorage.removeItem(SESSION_KEY);
    }

    // ── 화면 전환 ──
    function showDashboard(user) {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('dashboard-container').style.display = 'block';

        document.getElementById('nav-username').textContent = user.name;
        document.getElementById('welcome-message').textContent =
            user.name + '님, 환영합니다. 활동 요약을 확인하세요.';
        document.getElementById('profile-name').textContent = user.name;
        document.getElementById('profile-email').textContent = user.email;
    }

    function showAuth() {
        document.getElementById('auth-container').style.display = 'flex';
        document.getElementById('dashboard-container').style.display = 'none';
        showLoginBox();
    }

    function showLoginBox() {
        document.getElementById('login-box').classList.remove('hidden');
        document.getElementById('register-box').classList.add('hidden');
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('login-email').value = '';
        document.getElementById('login-password').value = '';
    }

    function showRegisterBox() {
        document.getElementById('register-box').classList.remove('hidden');
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('register-error').style.display = 'none';
        document.getElementById('register-success').style.display = 'none';
    }

    // ── 로그인 ──
    document.getElementById('btn-login').addEventListener('click', function () {
        var email = document.getElementById('login-email').value.trim();
        var password = document.getElementById('login-password').value;
        var errorEl = document.getElementById('login-error');

        errorEl.style.display = 'none';

        if (!email || !password) {
            errorEl.textContent = '이메일과 비밀번호를 입력해주세요.';
            errorEl.style.display = 'block';
            return;
        }

        var users = getUsers();
        var user = users.find(function (u) {
            return u.email === email && u.password === password;
        });

        if (!user) {
            errorEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
            errorEl.style.display = 'block';
            return;
        }

        setSession(user);
        showDashboard(user);
    });

    // ── 로그아웃 ──
    document.getElementById('btn-logout').addEventListener('click', function () {
        clearSession();
        showAuth();
    });

    // ── 회원가입 ──
    document.getElementById('btn-register').addEventListener('click', function () {
        var name = document.getElementById('register-name').value.trim();
        var email = document.getElementById('register-email').value.trim();
        var password = document.getElementById('register-password').value;
        var confirm = document.getElementById('register-confirm').value;
        var errorEl = document.getElementById('register-error');
        var successEl = document.getElementById('register-success');

        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!name || !email || !password || !confirm) {
            errorEl.textContent = '모든 항목을 입력해주세요.';
            errorEl.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            errorEl.textContent = '비밀번호는 6자 이상이어야 합니다.';
            errorEl.style.display = 'block';
            return;
        }

        if (password !== confirm) {
            errorEl.textContent = '비밀번호가 일치하지 않습니다.';
            errorEl.style.display = 'block';
            return;
        }

        var users = getUsers();
        var exists = users.find(function (u) { return u.email === email; });

        if (exists) {
            errorEl.textContent = '이미 사용 중인 이메일입니다.';
            errorEl.style.display = 'block';
            return;
        }

        users.push({ name: name, email: email, password: password });
        saveUsers(users);

        successEl.style.display = 'block';
        setTimeout(function () { showLoginBox(); }, 1500);
    });

    // ── 화면 전환 링크 ──
    document.getElementById('go-register').addEventListener('click', showRegisterBox);
    document.getElementById('go-login').addEventListener('click', showLoginBox);

    // ── 페이지 로드 시 세션 확인 ──
    (function init() {
        // 기본 테스트 계정 생성 (없으면)
        var users = getUsers();
        if (users.length === 0) {
            users.push({ name: 'Test User', email: 'test@probe.com', password: 'test1234' });
            saveUsers(users);
        }

        var session = getSession();
        if (session) {
            showDashboard(session);
        } else {
            showAuth();
        }
    })();
</script>

</body>
</html>
